<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="動画ナビ">

<title>Øvelsesbanken 動画ナビゲーター</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; background: #f8f7f4; color: #1a1a1a; padding: 1.5rem; max-width: 800px; margin: 0 auto; }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 1rem; color: #1a1a1a; }
  label { font-size: 12px; color: #666; display: block; margin-bottom: 5px; }
  input[type="search"] { width: 100%; padding: 12px 14px; font-size: 16px; border: 0.5px solid #ccc; border-radius: 10px; background: #fff; color: #1a1a1a; margin-bottom: 1rem; -webkit-appearance: none; }
  input[type="search"]:focus { outline: none; border-color: #1a6bbd; }
  select { width: 100%; padding: 8px 10px; font-size: 14px; border: 0.5px solid #ccc; border-radius: 8px; background: #fff; color: #1a1a1a; appearance: none; cursor: pointer; }
  select:disabled { background: #f0f0f0; color: #999; cursor: default; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 1rem; }
  .result-card { background: #f0ede8; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.25rem; border: 0.5px solid #ddd; }
  .result-card p.sub { font-size: 12px; color: #666; margin-bottom: 5px; }
  .result-card p.main { font-size: 15px; font-weight: 500; margin-bottom: 12px; }
  .btn-row { display: flex; flex-wrap: wrap; gap: 8px; }
  a.open-btn { font-size: 13px; padding: 6px 12px; border-radius: 8px; border: 0.5px solid #8ab8e0; background: #fff; color: #1a6bbd; text-decoration: none; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
  a.open-btn:hover { background: #e8f0fa; }
  details { margin-bottom: 1rem; }
  details summary { font-size: 14px; color: #666; cursor: pointer; padding: 8px 0; user-select: none; list-style: none; }
  details summary::-webkit-details-marker { display: none; }
  details summary::before { content: '▶ '; font-size: 10px; transition: transform 0.15s; display: inline-block; }
  details[open] summary::before { transform: rotate(90deg); }
  #search-results { margin-bottom: 1.25rem; }
  .hit { background: #fff; border: 0.5px solid #ddd; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; text-decoration: none; color: inherit; display: block; }
  .hit:hover { background: #f5f0e8; border-color: #8ab8e0; }
  .hit .hit-main { font-size: 15px; font-weight: 500; color: #1a1a1a; margin-bottom: 3px; }
  .hit .hit-sub { font-size: 12px; color: #666; }
  .hit-empty { font-size: 13px; color: #999; padding: 12px 0; text-align: center; }
  .tip { background: #fff8e8; border: 0.5px solid #e6d8a0; border-radius: 10px; padding: 12px 14px; margin-bottom: 1.25rem; font-size: 13px; color: #5a4a1a; line-height: 1.6; }
  .tip-title { font-weight: 500; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; }
  .tip-close { font-size: 12px; color: #8a6a1a; cursor: pointer; background: none; border: none; padding: 0; }
  .tip ul { margin: 4px 0 0 16px; padding: 0; }
  .tip li { margin: 2px 0; }
</style>
</head>

<h1>Øvelsesbanken 動画ナビゲーター</h1>

<input type="search" id="search-input" placeholder="検索（例：ブロック、ジャンプシュート、フェイント）" autocomplete="off">

<div class="tip" id="tr-tip">
  <div class="tip-title">
    <span>📘 リンク先のノルウェー語を日本語にする方法</span>
    <button class="tip-close" onclick="dismissTip()">閉じる</button>
  </div>
  <ul>
    <li><b>iPhone (Safari)</b>：URL欄の左にある「<b>ぁあ</b>」をタップ → 「翻訳」 → 「日本語に翻訳」</li>
    <li><b>Android (Chrome)</b>：メニュー（︙）→「翻訳」を選ぶ。次回からは自動で翻訳されます。</li>
    <li><b>PC (Chrome/Edge)</b>：ページ上で右クリック → 「日本語に翻訳」</li>
  </ul>
</div>

<div id="search-results"></div>

<details id="browse">
<summary>カテゴリから探す</summary>

<div class="grid">
  <div>
    <label>年齢層</label>
    <select id="sel-age"></select>
  </div>
  <div>
    <label>カテゴリ</label>
    <select id="sel-cat"></select>
  </div>
  <div>
    <label>内容</label>
    <select id="sel-sub"></select>
  </div>
  <div>
    <label>動画</label>
    <select id="sel-vid"></select>
  </div>
</div>

<div class="result-card">
  <p class="sub">選択中</p>
  <p class="main" id="res-label">—</p>
  <div class="btn-row">
    <a class="open-btn" id="res-link" href="#" target="_blank">↗ 動画ページを開く</a>
  </div>
</div>
</details>

function populateAge() {
  const s = document.getElementById('sel-age');
  Object.entries(TREE).forEach(([k,v]) => {
    const o = document.createElement('option'); o.value=k; o.textContent=v.label; s.appendChild(o);
  });
}

function populateCat() {
  const age = document.getElementById('sel-age').value;
  const s = document.getElementById('sel-cat'); s.innerHTML = '';
  Object.entries(TREE[age].cats).forEach(([k,v]) => {
    const o = document.createElement('option'); o.value=k; o.textContent=v.label; s.appendChild(o);
  });
  populateSub();
}

function populateSub() {
  const age = document.getElementById('sel-age').value;
  const cat = document.getElementById('sel-cat').value;
  const s = document.getElementById('sel-sub'); s.innerHTML = '';
  const subs = TREE[age].cats[cat].subs;
  Object.entries(subs).forEach(([k,v]) => {
    const o = document.createElement('option'); o.value=k; o.textContent=v.label; s.appendChild(o);
  });
  populateVid();
}

function populateVid() {
  const age = document.getElementById('sel-age').value;
  const cat = document.getElementById('sel-cat').value;
  const sub = document.getElementById('sel-sub').value;
  const s = document.getElementById('sel-vid'); s.innerHTML = '';
  const vids = TREE[age].cats[cat].subs[sub].vids;
  if (vids && vids.length) {
    s.disabled = false;
    vids.forEach(([k,label]) => {
      const o = document.createElement('option'); o.value=k; o.textContent=label; s.appendChild(o);
    });
  } else {
    s.disabled = true;
    const o = document.createElement('option'); o.value=''; o.textContent='（このページは動画一覧なし）'; s.appendChild(o);
  }
  updateResult();
}

function updateResult() {

  const vidSel = document.getElementById('sel-vid');
  const vid = !vidSel.disabled ? vidSel.value : null;

  const ageLabel = TREE[age].label;
  const catLabel = TREE[age].cats[cat].label;
  const subLabel = TREE[age].cats[cat].subs[sub].label;

  let url, label;
  if (vid) {
    const vidEntry = (TREE[age].cats[cat].subs[sub].vids || []).find(v => v[0] === vid);
    const vl = vidEntry ? vidEntry[1] : vid;
    url = `${BASE}/${age}/${cat}/${sub}/${vid}`;
    label = `${ageLabel} / ${catLabel} / ${subLabel} / ${vl}`;
  } else {
    url = `${BASE}/${age}/${cat}/${sub}`;
    label = `${ageLabel} / ${catLabel} / ${subLabel}`;
  }

  document.getElementById('res-label').textContent = label;
  document.getElementById('res-link').href = url;
}

document.getElementById('sel-age').addEventListener('change', populateCat);
document.getElementById('sel-cat').addEventListener('change', populateSub);
document.getElementById('sel-sub').addEventListener('change', populateVid);
document.getElementById('sel-vid').addEventListener('change', updateResult);

populateAge();
populateCat();

// --- Search ---
const INDEX = [];
Object.entries(TREE).forEach(([ageK, age]) => {
  Object.entries(age.cats).forEach(([catK, cat]) => {
    Object.entries(cat.subs).forEach(([subK, sub]) => {
      const ageBoost = ageK === '16-20' ? 0 : ageK === '13-15' ? 1 : ageK === '10-12' ? 2 : 3;
      if (sub.vids && sub.vids.length) {
        sub.vids.forEach(([vidK, vidLabel]) => {
          INDEX.push({
            hay: `${vidLabel} ${vidK} ${sub.label} ${cat.label} ${age.label}`.toLowerCase(),
            url: `${BASE}/${ageK}/${catK}/${subK}/${vidK}`,
            main: vidLabel,
            sub: `${age.label} / ${cat.label} / ${sub.label}`,
            ageBoost,
          });
        });
      } else {
        INDEX.push({
          hay: `${sub.label} ${subK} ${cat.label} ${age.label}`.toLowerCase(),
          url: `${BASE}/${ageK}/${catK}/${subK}`,
          main: sub.label,
          sub: `${age.label} / ${cat.label}`,
          ageBoost,
        });
      }
    });
  });
});

const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');
const browseDetails = document.getElementById('browse');

function runSearch() {
  const q = searchInput.value.toLowerCase().trim();
  if (!q) {
    searchResults.innerHTML = '';
    browseDetails.style.display = '';
    return;
  }
  browseDetails.style.display = 'none';
  const hits = INDEX
    .filter(item => item.hay.includes(q))
    .sort((a, b) => a.ageBoost - b.ageBoost)
    .slice(0, 25);
  if (!hits.length) {
    searchResults.innerHTML = '<div class="hit-empty">該当なし</div>';
    return;
  }
  searchResults.innerHTML = hits.map(h => `
    <a class="hit" href="${h.url}" target="_blank" rel="noopener">
      <div class="hit-main">${h.main}</div>
      <div class="hit-sub">${h.sub}</div>
    </a>
  `).join('');
}

searchInput.addEventListener('input', runSearch);

// --- Translation tip dismissal ---
function dismissTip() {
  document.getElementById('tr-tip').style.display = 'none';
  try { localStorage.setItem('tr_tip_dismissed', '1'); } catch(e) {}
}
try {
  if (localStorage.getItem('tr_tip_dismissed') === '1') {
    document.getElementById('tr-tip').style.display = 'none';
  }
} catch(e) {}

// --- PWA ---
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
