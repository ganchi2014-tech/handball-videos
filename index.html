function populateAge() {
  const s = document.getElementById('sel-age');
  Object.entries(TREE).forEach(([k,v]) => {
    const o = document.createElement('option'); o.value=k; o.textContent=v.label; s.appendChild(o);
  });
}

function populateCat() {
  const age = document.getElementById('sel-age').value;
  const s = document.getElementById('sel-cat'); s.innerHTML = '';
  Object.entries(TREE[age].cats).forEach(([k,v]) => {
    const o = document.createElement('option'); o.value=k; o.textContent=v.label; s.appendChild(o);
  });
  populateSub();
}

function populateSub() {
  const age = document.getElementById('sel-age').value;
  const cat = document.getElementById('sel-cat').value;
  const s = document.getElementById('sel-sub'); s.innerHTML = '';
  const subs = TREE[age].cats[cat].subs;
  Object.entries(subs).forEach(([k,v]) => {
    const o = document.createElement('option'); o.value=k; o.textContent=v.label; s.appendChild(o);
  });
  populateVid();
}

function populateVid() {
  const age = document.getElementById('sel-age').value;
  const cat = document.getElementById('sel-cat').value;
  const sub = document.getElementById('sel-sub').value;
  const s = document.getElementById('sel-vid'); s.innerHTML = '';
  const vids = TREE[age].cats[cat].subs[sub].vids;
  if (vids && vids.length) {
    s.disabled = false;
    vids.forEach(([k,label]) => {
      const o = document.createElement('option'); o.value=k; o.textContent=label; s.appendChild(o);
    });
  } else {
    s.disabled = true;
    const o = document.createElement('option'); o.value=''; o.textContent='（このページは動画一覧なし）'; s.appendChild(o);
  }
  updateResult();
}

function updateResult() {
  const age = document.getElementById('sel-age').value;
  const cat = document.getElementById('sel-cat').value;
  const sub = document.getElementById('sel-sub').value;
  const vidSel = document.getElementById('sel-vid');
  const vid = !vidSel.disabled ? vidSel.value : null;

  const ageLabel = TREE[age].label;
  const catLabel = TREE[age].cats[cat].label;
  const subLabel = TREE[age].cats[cat].subs[sub].label;

  let url, label;
  if (vid) {
    const vidEntry = (TREE[age].cats[cat].subs[sub].vids || []).find(v => v[0] === vid);
    const vl = vidEntry ? vidEntry[1] : vid;
    url = `${BASE}/${age}/${cat}/${sub}/${vid}`;
    label = `${ageLabel} / ${catLabel} / ${subLabel} / ${vl}`;
  } else {
    url = `${BASE}/${age}/${cat}/${sub}`;
    label = `${ageLabel} / ${catLabel} / ${subLabel}`;
  }

  document.getElementById('res-label').textContent = label;
  document.getElementById('res-link').href = url;
}

document.getElementById('sel-age').addEventListener('change', populateCat);
document.getElementById('sel-cat').addEventListener('change', populateSub);
document.getElementById('sel-sub').addEventListener('change', populateVid);
document.getElementById('sel-vid').addEventListener('change', updateResult);

populateAge();
