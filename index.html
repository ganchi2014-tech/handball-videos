<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#e85d29">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="練習動画ナビ">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>ハンドボール練習動画ナビ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; background: #f8f7f4; color: #1a1a1a; padding: 1rem; max-width: 900px; margin: 0 auto; }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 1rem; }
  input[type="search"] { width: 100%; padding: 12px 14px; font-size: 16px; border: 0.5px solid #ccc; border-radius: 10px; background: #fff; color: #1a1a1a; margin-bottom: 0.75rem; -webkit-appearance: none; }
  input[type="search"]:focus { outline: none; border-color: #e85d29; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1rem; }
  .chip { font-size: 13px; padding: 6px 12px; border-radius: 999px; border: 0.5px solid #ccc; background: #fff; color: #444; cursor: pointer; user-select: none; }
  .chip.active { background: #e85d29; border-color: #e85d29; color: #fff; }
  .chip-label { font-size: 11px; color: #888; margin-right: 6px; align-self: center; }
  .status { font-size: 12px; color: #888; margin-bottom: 0.75rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  .card { background: #fff; border: 0.5px solid #ddd; border-radius: 10px; overflow: hidden; cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; display: flex; flex-direction: column; }
  .card:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .card .thumb-wrap { position: relative; aspect-ratio: 16/9; background: #eee; overflow: hidden; }
  .card .thumb { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card .play { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 32px; color: #fff; text-shadow: 0 0 10px rgba(0,0,0,0.6); opacity: 0.85; }
  .card-body { padding: 8px 10px; flex: 1; display: flex; flex-direction: column; }
  .card-breadcrumb { font-size: 11px; color: #888; margin-bottom: 4px; }
  .card-title { font-size: 13px; color: #333; line-height: 1.4; flex: 1; }
  .empty { font-size: 13px; color: #999; text-align: center; padding: 2rem 0; }
  .loading { font-size: 13px; color: #888; text-align: center; padding: 2rem 0; }
  /* modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: none; align-items: center; justify-content: center; padding: 1rem; }
  .modal-bg.show { display: flex; }
  .modal { background: #000; border-radius: 10px; width: 100%; max-width: 900px; position: relative; }
  .modal-close { position: absolute; top: -36px; right: 0; font-size: 22px; color: #fff; cursor: pointer; background: none; border: none; padding: 4px 10px; }
  .modal-info { background: #1a1a1a; color: #ddd; padding: 10px 14px; font-size: 13px; border-radius: 0 0 10px 10px; }
  .modal-breadcrumb { font-size: 11px; color: #999; margin-bottom: 4px; }
  .modal-title { font-size: 14px; line-height: 1.5; }
  .modal-player { aspect-ratio: 16/9; width: 100%; }
  .modal-player iframe { width: 100%; height: 100%; border: 0; border-radius: 10px 10px 0 0; }
</style>
</head>
<body>

<h1>ハンドボール練習動画ナビ</h1>

<input type="search" id="q" placeholder="検索（例：シュート、ブロック、フェイント）" autocomplete="off">

<div class="chips" id="age-chips">
  <span class="chip-label">年齢</span>
</div>

<div class="chips" id="subj-chips">
  <span class="chip-label">分野</span>
</div>

<div class="status" id="status">読み込み中…</div>

<div class="grid" id="grid"></div>

<div class="modal-bg" id="modal" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">✕ 閉じる</button>
    <div class="modal-player" id="player"></div>
    <div class="modal-info">
      <div class="modal-breadcrumb" id="modal-bc"></div>
      <div class="modal-title" id="modal-title"></div>
    </div>
  </div>
</div>

<script>
const LEVELS = [['16-20','高校 (16〜20)'],['13-15','中学 (13〜15)'],['10-12','小高 (10〜12)'],['6-9','小低 (6〜9)']];

const SUBJ = {
  'forsvar': '守備',
  'angrep': '攻撃',
  'kontra-retur': 'カウンター',
  'malvakt': 'GK',
  'fysisk': 'フィジカル',
  'mentalt-og-sosialt': 'メンタル・理論',
};

const CAT = {
  'teknikk': '技術',
  'spill-og-motspill-1-mot-1': '1対1',
  'spill-og-motspill-i-sma-grupper': '小グループ',
  'spill-og-motspill-i-store-grupper': '大グループ',
  'leker-og-oppvarming': 'ウォームアップ',
  'fysiske-forutsetninger': 'フィジカル基礎',
  'grunnleggende-teknikk-og-taktikk': '基礎技術・戦術',
  'kompleks-teknikk-og-taktikk': '応用技術・戦術',
  'trening-med-utstyr': '器具あり',
  'trening-uten-utstyr': '器具なし',
  'praksis': '実践',
  'teori': '理論',
  'motorikk-og-koordinasjon': '運動・コーディネーション',
};

const TECH = {
  'takle': 'タックル','snappe': 'スナップ','finte': 'フェイント','blokke': 'ブロック',
  'stenge': '閉鎖','sikre': 'カバー','forflytte': '移動・ステップ','hjelpe': 'ヘルプDF','presse': 'プレス',
  'midtsektor': 'センターゾーン','sidesektor': 'サイドゾーン','hele-banen': '全コート',
  'ballbehandling': 'ボールハンドリング','kast-og-mottak': 'パス＆キャッチ',
  'skudd-fra-gulvet': 'フロアシュート','skudd-fra-lufta': 'ジャンプシュート',
  'innspillsteknikk': 'インカット技術','utspillsteknikk': 'アウトカット技術','oppspill': 'セットアップ',
  'kantskudd': 'ウィングシュート','linjeskudd': 'ラインシュート','sperreteknik': 'スクリーン技術',
  'kast-og-forflytning': 'パス＆ムーブ','overgangsspill': 'トランジション','krysningsspill': 'クロスプレー',
  'distanse': '距離感・ポジション','kant': 'ウィング対応','naerskudd': '至近距離シュート対応',
  'igangsetting': 'カウンター開始','flerskuddovelser': '連続シュート対応','valgovelser': '判断系練習',
  'spillesituasjoner-med-forsvar': 'DFとの連携',
  'indre-dialog': '内的対話','selvtillit': '自信','maalsetning': '目標設定',
  'visualisering': 'イメージトレーニング','konsentrasjon': '集中力','stressmestring': 'ストレスマネジメント',
  'kamp-og-treningsforberedelser': '試合・練習準備','motivasjon': 'モチベーション',
  'spenningsregulering': '覚醒レベル調整','lagbygging': 'チームビルディング',
  'hurtighet-og-spenst': 'スピード・ジャンプ力','mobilitet-bevegelighet': '柔軟性・モビリティ',
};

const labelSubj = s => SUBJ[s] || s;
const labelCat = c => CAT[c] || c;
const labelTech = t => t ? (TECH[t] || t) : null;
const labelLevel = l => (LEVELS.find(x => x[0] === l) || [l, l])[1];

let DATA = [];
let currentLevel = '16-20';
let currentSubj = 'all';

const thumbSmall = url => url ? url.replace('_1920x1080', '_640x360') : '';

function buildHaystack(d) {
  return [
    d.n, d.ja || '',
    labelSubj(d.s), labelCat(d.c), labelTech(d.t) || '',
    d.s, d.c, d.t || ''
  ].join(' ').toLowerCase();
}

function render() {
  const q = document.getElementById('q').value.toLowerCase().trim();
  let filtered = DATA;
  if (currentLevel !== 'all') filtered = filtered.filter(d => d.l === currentLevel);
  if (currentSubj !== 'all') filtered = filtered.filter(d => d.s === currentSubj);
  if (q) filtered = filtered.filter(d => d._hay.includes(q));

  const status = document.getElementById('status');
  status.textContent = `${filtered.length} 件`;

  const grid = document.getElementById('grid');
  const shown = filtered.slice(0, 60);
  if (!shown.length) {
    grid.innerHTML = '<div class="empty">該当する動画がありません</div>';
    return;
  }
  grid.innerHTML = shown.map((d, i) => {
    const techLabel = labelTech(d.t);
    const bc = [labelLevel(d.l), labelSubj(d.s), labelCat(d.c), techLabel].filter(Boolean).join(' / ');
    const title = d.ja || d.n || '';
    return `
      <div class="card" data-idx="${DATA.indexOf(d)}">
        <div class="thumb-wrap">
          <img class="thumb" src="${thumbSmall(d.th)}" loading="lazy" alt="">
          <div class="play">▶</div>
        </div>
        <div class="card-body">
          <div class="card-breadcrumb">${bc}</div>
          <div class="card-title">${title}</div>
        </div>
      </div>
    `;
  }).join('');

  if (filtered.length > shown.length) {
    grid.insertAdjacentHTML('beforeend', `<div class="empty">他 ${filtered.length - shown.length} 件は条件を絞ってください</div>`);
  }

  grid.querySelectorAll('.card').forEach(el => {
    el.addEventListener('click', () => openModal(DATA[+el.dataset.idx]));
  });
}

function openModal(d) {
  const bc = [labelLevel(d.l), labelSubj(d.s), labelCat(d.c), labelTech(d.t)].filter(Boolean).join(' / ');
  document.getElementById('modal-bc').textContent = bc;
  const titleEl = document.getElementById('modal-title');
  if (d.ja) {
    titleEl.innerHTML = `${d.ja}<div style="font-size:11px;color:#888;margin-top:4px">${d.n || ''}</div>`;
  } else {
    titleEl.textContent = d.n || '';
  }
  document.getElementById('player').innerHTML = `<iframe src="https://player.vimeo.com/video/${d.v}?autoplay=1" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>`;
  document.getElementById('modal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target && !e.target.classList.contains('modal-bg') && !e.target.classList.contains('modal-close')) return;
  document.getElementById('modal').classList.remove('show');
  document.getElementById('player').innerHTML = '';
  document.body.style.overflow = '';
}

function buildChips() {
  const ageChips = document.getElementById('age-chips');
  LEVELS.forEach(([k, label]) => {
    const c = document.createElement('span');
    c.className = 'chip' + (k === currentLevel ? ' active' : '');
    c.textContent = label;
    c.onclick = () => { currentLevel = k; document.querySelectorAll('#age-chips .chip').forEach(x => x.classList.remove('active')); c.classList.add('active'); render(); };
    ageChips.appendChild(c);
  });

  const subjChips = document.getElementById('subj-chips');
  const allChip = document.createElement('span');
  allChip.className = 'chip active';
  allChip.textContent = 'すべて';
  allChip.onclick = () => { currentSubj = 'all'; document.querySelectorAll('#subj-chips .chip').forEach(x => x.classList.remove('active')); allChip.classList.add('active'); render(); };
  subjChips.appendChild(allChip);
  Object.entries(SUBJ).forEach(([k, label]) => {
    const c = document.createElement('span');
    c.className = 'chip';
    c.textContent = label;
    c.onclick = () => { currentSubj = k; document.querySelectorAll('#subj-chips .chip').forEach(x => x.classList.remove('active')); c.classList.add('active'); render(); };
    subjChips.appendChild(c);
  });
}

async function init() {
  buildChips();
  try {
    const r = await fetch('data.json');
    DATA = await r.json();
    DATA.forEach(d => { d._hay = buildHaystack(d); });
    document.getElementById('q').addEventListener('input', render);
    render();
  } catch (e) {
    document.getElementById('status').textContent = 'データ読み込みエラー: ' + e.message;
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal({target: {classList: {contains: () => true}}}); });

init();

// --- PWA ---
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
